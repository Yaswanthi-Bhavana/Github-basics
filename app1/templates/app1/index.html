<!DOCTYPE html>
<html>

<head>
    <title>Weather App</title>
</head>

<body>

    <h2>Weather App</h2>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="city" placeholder="Enter City Name">
        <button type="submit">Check Weather</button>
    </form>

    {% if error %}
    <p>{{ error }}</p>
    {% endif %}

    {% if users %}
    <p>City: {{ users.city }}</p>
    <p>Temperature: {{ users.temperature }} °C</p>
    <p>Humidity: {{ users.humidity }} %</p>
    <p>Wind Speed: {{ users.wind }} m/s</p>
    <p>Description: {{ users.description }}</p>
    {% endif %}

</body>

</html>
